name: Build Android Debug APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (leave empty for current)"
        required: false
        default: ""
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Node dependencies
        run: npm ci

      - name: Create .env from template
        run: cp env.template .env

      - name: Fix local.properties (set SDK path for CI)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install NDK 27.1.12297006
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Clear stale Transistorsoft Gradle cache
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.transistorsoft
          find ~/.gradle/caches/modules-2/metadata-* -path "*/com.transistorsoft*" -delete 2>/dev/null || true

      - name: Patch background-geolocation for CI build
        run: |
          BG_GRADLE="node_modules/react-native-background-geolocation/android/build.gradle"
          if [ -f "$BG_GRADLE" ]; then
            sed -i "s|url './libs'|url '${GITHUB_WORKSPACE}/node_modules/react-native-background-geolocation/android/libs'|g" "$BG_GRADLE"
            sed -i "s|version: '+'|version: '3.6.8'|g" "$BG_GRADLE"
            echo "Patched background-geolocation build.gradle for CI"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Show build failure details
        if: failure()
        run: |
          echo "=== FAILURE SUMMARY ==="
          grep -A 30 "FAILURE: Build failed" /tmp/gradle-build.log || true
          echo "=== TASKS THAT FAILED ==="
          grep "FAILED\|> Task" /tmp/gradle-build.log | tail -50 || true
          echo "=== LAST ERROR LINES ==="
          grep -i "error:\|exception\|what went wrong" /tmp/gradle-build.log | tail -50 || true

      - name: List generated APKs
        run: find android/app/build/outputs/apk/debug -name "*.apk" | sort

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/
          retention-days: 14
          if-no-files-found: error
