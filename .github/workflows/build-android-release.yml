name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag (e.g. v1.2.0). Leave empty to auto-generate."
        required: false
        default: ""
      create_release:
        description: "Publish as GitHub Release"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    name: Android Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Node dependencies
        run: npm ci

      - name: Use .env.release for release build
        run: |
          if [ -f .env.release ]; then
            cp .env.release .env
            echo "Using .env.release"
          else
            cp env.template .env
            echo "Warning: .env.release not found, using env.template"
          fi

      - name: Fix local.properties (set SDK path for CI)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install NDK 27.1.12297006
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Clear stale Transistorsoft Gradle cache
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.transistorsoft
          find ~/.gradle/caches/modules-2/metadata-* -path "*/com.transistorsoft*" -delete 2>/dev/null || true

      - name: Patch background-geolocation for CI build
        run: |
          BG_GRADLE="node_modules/react-native-background-geolocation/android/build.gradle"
          if [ -f "$BG_GRADLE" ]; then
            sed -i "s|url './libs'|url '${GITHUB_WORKSPACE}/node_modules/react-native-background-geolocation/android/libs'|g" "$BG_GRADLE"
            sed -i "s|version: '+'|version: '3.6.8'|g" "$BG_GRADLE"
            echo "Patched background-geolocation build.gradle for CI"
          fi

      - name: Set up release signing (from secrets)
        if: ${{ env.KEYSTORE_B64 != '' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties << 'PROPS'
          storeFile=release.keystore
          PROPS
          echo "storePassword=${{ secrets.RELEASE_KEY_STORE_PASSWORD }}" >> android/keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> android/keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> android/keystore.properties
          echo "Release signing configured from secrets"

      - name: Generate debug keystore (fallback when secrets not set)
        if: ${{ env.KEYSTORE_B64 == '' }}
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias workforce \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass workforce_debug_password \
            -keypass workforce_debug_password \
            -dname "CN=WorkforceTracker, OU=Mobile, O=WorkforceTracker, L=Moscow, ST=Moscow, C=RU"
          cat > ../keystore.properties << 'PROPS'
          storeFile=release.keystore
          storePassword=workforce_debug_password
          keyAlias=workforce
          keyPassword=workforce_debug_password
          PROPS
          echo "Warning: using auto-generated debug keystore (set RELEASE_KEYSTORE_BASE64 secret for production signing)"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all 2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Show build failure details
        if: failure()
        run: |
          echo "=== FAILURE SUMMARY ==="
          grep -A 30 "FAILURE: Build failed" /tmp/gradle-build.log || true
          echo "=== TASKS THAT FAILED ==="
          grep "FAILED\|> Task" /tmp/gradle-build.log | tail -50 || true
          echo "=== LAST ERROR LINES ==="
          grep -i "error:\|exception\|what went wrong" /tmp/gradle-build.log | tail -50 || true

      - name: List generated APKs
        run: find android/app/build/outputs/apk/release -name "*.apk" | sort

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            TAG="${{ inputs.version_tag }}"
          else
            TAG="release-$(date +'%Y%m%d')-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Upload Release APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.tag.outputs.tag }}
          path: android/app/build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            Android Release APK built from branch `${{ github.ref_name }}` (run #${{ github.run_number }}).

            **Install on Android phone:**
            1. Download the APK file below
            2. Open the APK on your phone to install
            3. Enable "Install unknown apps" if prompted

            > Signing: production key if `RELEASE_KEYSTORE_BASE64` secret is set, otherwise falls back to debug key (suitable for personal testing).
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: true
