name: Build Release APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env.release
        run: |
          cat > .env.release <<'EOF'
          API_URL=https://api.tabelshik.com
          API_TOKEN=wqHJerK834
          BG_GEO_LICENSE_ANDROID=7d1976aa376fbcf7e40d12892c8dab579985abbcbc09e1da570826649b4295cf
          BG_TEST_FORCE_TRACKING=0
          BG_WEBHOOK_URL=https://api.tabelshik.com/api/db_save/
          DEVICE_IMEI=production-device
          BG_FORCE_PACE_ON_START=0
          EOF

      - name: Generate release keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore workforce-release.keystore \
            -alias workforce \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass workforce_release_password \
            -keypass workforce_release_password \
            -dname "CN=WorkforceTracker, OU=Mobile, O=WorkforceTracker, L=Moscow, ST=Moscow, C=RU"

      - name: Create keystore.properties
        working-directory: android
        run: |
          cat > keystore.properties <<'EOF'
          storeFile=workforce-release.keystore
          storePassword=workforce_release_password
          keyAlias=workforce
          keyPassword=workforce_release_password
          EOF

      - name: Debug - Verify native AAR files exist
        run: |
          echo "=== Checking tslocationmanager AAR files ==="
          ls -la node_modules/react-native-background-geolocation/android/libs/com/transistorsoft/tslocationmanager/3.6.8/ || echo "tslocationmanager NOT FOUND"
          ls -la node_modules/react-native-background-geolocation/android/libs/com/transistorsoft/tslocationmanager-v21/3.6.8/ || echo "tslocationmanager-v21 NOT FOUND"

          echo ""
          echo "=== Verifying BackgroundGeolocation class in AAR ==="
          cd /tmp
          cp $GITHUB_WORKSPACE/node_modules/react-native-background-geolocation/android/libs/com/transistorsoft/tslocationmanager/3.6.8/tslocationmanager-3.6.8.aar .
          unzip -o tslocationmanager-3.6.8.aar classes.jar
          jar tf classes.jar | grep BackgroundGeolocation.class
          javap -public -cp classes.jar com.transistorsoft.locationmanager.adapter.BackgroundGeolocation | grep EVENT

          echo ""
          echo "=== Checking play-services-location version resolution ==="
          grep -r "playServicesLocationVersion" $GITHUB_WORKSPACE/android/build.gradle $GITHUB_WORKSPACE/node_modules/react-native-background-geolocation/android/build.gradle || echo "Not found"

      - name: Debug - Check Gradle dependency resolution
        working-directory: android
        run: |
          chmod +x gradlew
          echo "=== Resolving dependencies for :react-native-background-geolocation ==="
          ./gradlew :react-native-background-geolocation:dependencies --configuration api 2>&1 | head -100 || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build-output.log
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: workforce-tracker-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
