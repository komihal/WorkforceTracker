name: Build Release APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env.release
        run: |
          cat <<'EOF' > .env.release
          API_URL=https://api.tabelshik.com
          API_TOKEN=wqHJerK834
          BG_GEO_LICENSE_ANDROID=7d1976aa376fbcf7e40d12892c8dab579985abbcbc09e1da570826649b4295cf
          BG_TEST_FORCE_TRACKING=0
          BG_WEBHOOK_URL=https://api.tabelshik.com/api/db_save/
          DEVICE_IMEI=production-device
          BG_FORCE_PACE_ON_START=0
          EOF

      - name: Generate release keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore workforce-release.keystore \
            -alias workforce \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass workforce_release_password \
            -keypass workforce_release_password \
            -dname "CN=WorkforceTracker, OU=Mobile, O=WorkforceTracker, L=Moscow, ST=Moscow, C=RU"

      - name: Create keystore.properties
        working-directory: android
        run: |
          cat <<'EOF' > keystore.properties
          storeFile=workforce-release.keystore
          storePassword=workforce_release_password
          keyAlias=workforce
          keyPassword=workforce_release_password
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: workforce-tracker-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
