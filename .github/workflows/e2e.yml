name: E2E Tests (Detox)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env from template
        run: cp env.template .env

      - name: Setup Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fix local.properties (set SDK path for CI)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install NDK 27.1.12297006
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-e2e-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-e2e-

      - name: Clear stale Transistorsoft Gradle cache
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.transistorsoft
          find ~/.gradle/caches/modules-2/metadata-* -path "*/com.transistorsoft*" -delete 2>/dev/null || true

      - name: Patch background-geolocation for CI build
        run: |
          BG_GRADLE="node_modules/react-native-background-geolocation/android/build.gradle"
          if [ -f "$BG_GRADLE" ]; then
            sed -i "s|url './libs'|url '${GITHUB_WORKSPACE}/node_modules/react-native-background-geolocation/android/libs'|g" "$BG_GRADLE"
            sed -i "s|version: '+'|version: '3.6.8'|g" "$BG_GRADLE"
            echo "Patched background-geolocation build.gradle for CI"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Detox APK
        run: npm run test:e2e:build

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Pixel 4
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: npm run test:e2e -- --headless

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: artifacts/
          retention-days: 7
